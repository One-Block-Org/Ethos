<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 380" style="background-color:#0d1117">
  <defs>
    <!-- EVM gradient: sky-blue → indigo -->
    <linearGradient id="grad-evm" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>
    <!-- WASM gradient: amber → orange -->
    <linearGradient id="grad-wasm" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
    <!-- Revert gradient: red -->
    <linearGradient id="grad-revert" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f87171" />
      <stop offset="100%" stop-color="#991b1b" />
    </linearGradient>
  </defs>

  <style>
    .label   { font-family: 'Inter', 'Roboto Mono', monospace; fill: #f1f5f9; font-size: 11px; dominant-baseline: middle; pointer-events: none; }
    .legend  { font-family: 'Inter', 'Roboto Mono', monospace; fill: #94a3b8; font-size: 10px; dominant-baseline: middle; }
    .sep-txt { font-family: 'Inter', 'Roboto Mono', monospace; fill: #f59e0b; font-size: 10px; font-weight: 600; dominant-baseline: middle; letter-spacing: 0.08em; }
    .box-evm   { fill: url(#grad-evm);    stroke: #1e3a5f; stroke-width: 0.5; }
    .box-wasm  { fill: url(#grad-wasm);   stroke: #78350f; stroke-width: 0.5; }
    .box-revert{ fill: url(#grad-revert); stroke: #7f1d1d; stroke-width: 0.5; }
  </style>

